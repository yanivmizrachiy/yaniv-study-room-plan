name: "בקשת שינוי באתר"
description: "פתח בקשה מסודרת לשינוי אמיתי באתר"
title: "[שינוי] "
labels: []
body:
  - type: textarea
    id: summary
    attributes:
      label: מה רוצים לשנות
      description: כתוב ברור מה צריך להשתנות
      placeholder: תיאור מלא של השינוי
    validations:
      required: true

  - type: textarea
    id: location
    attributes:
      label: איפה זה נמצא באתר
      description: איזה אזור, כפתור, חלק בחדר או מסך
      placeholder: לדוגמה תכנית עליונה / כפתורי שליטה / טקסט עליון
    validations:
      required: true

  - type: textarea
    id: constraints
    attributes:
      label: מגבלות חשובות
      description: מה אסור לשבור
      placeholder: לשמור RTL, לא לפגוע ב-GitHub Pages, לשמור עברית מלאה
    validations:
      required: false
