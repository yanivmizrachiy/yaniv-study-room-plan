name: repo-dispatch-command

on:
  repository_dispatch:
    types: [room_command]

jobs:
  execute:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Save dispatch payload
        shell: bash
        run: |
          mkdir -p state
          cat > state/repository-dispatch-last.json <<EOF
          {
            "event_type": "room_command",
            "client_payload": ${{ toJson(github.event.client_payload) }},
            "source": "repository_dispatch",
            "repo": "yanivmizrachiy/yaniv-study-room-plan",
            "received_at_utc": "$(date -u +"%Y-%m-%dT%H:%M:%SZ")",
            "status": "ok"
          }
          EOF
          cat state/repository-dispatch-last.json

      - name: Upload dispatch artifact
        uses: actions/upload-artifact@v4
        with:
          name: repository-dispatch-result
          path: state/repository-dispatch-last.json
